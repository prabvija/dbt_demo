name: 'dbt_demo'
version: '1.0.0'
config-version: 2

profile: 'dbt_demo'

model-paths:   ["models"]
seed-paths:    ["seeds"]
macro-paths:   ["macros"]
test-paths:    ["tests"]

# Standard dbt layered project for the bootcamp:
#   seeds  ->  sources  ->  staging  ->  intermediate  ->  marts
#
# Layer conventions:
#   seeds        : raw CSVs loaded via `dbt seed` (landed in <schema>_raw)
#   sources      : declared in models/staging/_sources.yml (point at the seeds)
#   staging      : 1:1 with sources, rename/cast only  (view)
#   intermediate : joins & business logic building blocks (view)
#   marts        : final BI-facing dims & facts (table)

models:
  dbt_demo:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts

seeds:
  dbt_demo:
    +schema: raw
